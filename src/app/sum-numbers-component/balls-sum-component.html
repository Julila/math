<div class="sum-numbers-container">
  <app-star-score-component
    [attemptResult]="lastAttemptResult"
    (gameCompleted)="onGameCompleted()"
    (startAgain)="startAgain()"
  >
  </app-star-score-component>

  @if (gameCompleted) {
    <game-over-component (startAgainClicked)="startAgain()"></game-over-component>
  }

  <!-- Game content (hidden when completed) -->
  @if (!gameCompleted) {
    <div class="game-content">
      <!-- Two grids with addition symbol -->
      <div class="grids-container">
        <!-- Left grid with two rows -->
        <div class="grid-section">
          <div class="circles-container left-grid">
            <div class="circle-row" *ngFor="let row of getLeftGridRows()">
              <div
                *ngFor="let position of row"
                class="circle-position"
                [class.circle-filled]="position === 1"
                [class.circle-empty]="position === 0"
              ></div>
            </div>
          </div>
        </div>

        <!-- Plus symbol -->
        <div class="plus-symbol">+</div>

        <!-- Right grid -->
        <div class="grid-section">
          <div class="circles-container">
            <div class="circle-row" *ngFor="let row of getRowsOfCircles(rightCircles)">
              <div class="circle" *ngFor="let circle of row"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Answer options -->
      <div class="answer-section">
        <div class="answer-options">
          <button
            *ngFor="let option of answerOptions"
            class="answer-btn"
            [class.selected]="selectedAnswer === option"
            [class.correct]="isCorrect === true && selectedAnswer === option"
            [class.incorrect]="isCorrect === false && selectedAnswer === option"
            (click)="selectAnswer(option)"
            [disabled]="selectedAnswer !== null"
          >
            {{ option }}
          </button>
        </div>
      </div>
    </div>
  }
</div>
